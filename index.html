<!DOCTYPE html>
<html lang="en">
	<head>
		<!-- Required meta tags -->
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

		<!-- Bootstrap CSS -->
		<link
			rel="stylesheet"
			href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
			integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
			crossorigin="anonymous"
		/>

		<!-- Local Stylesheet -->
		<link rel="stylesheet" href="./css/style.css" />

		<title class="titleText"></title>
	</head>
	<body>
		<div id="page-container">
			<nav>
				<a href="https://maddenmedia.com/">
					<img src="./img/madden-logo.png" height="40" class="m-2 ml-4" alt="" />
				</a>
				<h4 id="specialLineFriend">|</h4>
				<h4 class="titleText m-0 p-2"></h4>
			</nav>

			<div class="container pb-5">
				<img id="clientLogo" class="w-25 mx-auto d-block my-4" src="" alt="" />
				<div id="allButtons" class="d-flex justify-content-center my-4"></div>
				<div id="forSpinner" class="my-4">
					<img id="imgViewer" class="d-block mx-auto img-fluid" src="" alt="" />
				</div>
			</div>
			<footer id="footsies" class="py-3 bg-dark">
				<a class="text-white d-block text-center" href="#">Return to Top</a>
			</footer>
		</div>

		<!-- Local JavaScript File -->
		<script src="./js/script.js"></script>

		<!-- Optional JavaScript -->
		<!-- jQuery first, then Popper.js, then Bootstrap JS -->
		<script
			src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
			integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
			crossorigin="anonymous"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
			integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
			crossorigin="anonymous"
		></script>
		<script
			src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"
			integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
			crossorigin="anonymous"
		></script>
	</body>
</html>
